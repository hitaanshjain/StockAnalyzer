services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=stocks_app
    volumes:
      - mongo_data:/data/db

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "5001:5000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=stocks_app
    depends_on:
      - mongodb

  pipeline:
    build: ./pipeline
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=stocks_app
    depends_on:
      - mongodb
    profiles:
      - pipeline

  mongo_seed:
    build: ./mongo_service
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=stocks_app
      - PIPELINE_OUTPUT_DIR=/seed/pipeline/output
    volumes:
      - ./pipeline/output:/seed/pipeline/output:ro
    depends_on:
      - mongodb
    profiles:
      - seed

volumes:
  mongo_data:
