name: Web CI/CD

# runs on every push or PR to main
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # pull the code
      - name: Checkout code
        uses: actions/checkout@v4

      # set up python so we can run the tests
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # install the web app's dependencies + testing tools
      # also installs pipeline deps because web imports pipeline code
      - name: Install dependencies
        run: |
          pip install -r web/requirements.txt
          pip install -r pipeline/requirements.txt
          pip install pytest pytest-cov

      # run tests — fails the pipeline if coverage drops below 80%
      - name: Run tests
        run: |
          cd web
          pytest tests/ --cov=. --cov-report=term-missing

      # log into docker hub so we can push the image
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # build the docker image and push it to docker hub
      # context must be repo root so the Dockerfile can reach both web/ and pipeline/
      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stocks-web:latest

      # copy docker-compose to the droplet so it knows how to start everything
      - name: Copy docker-compose to Digital Ocean
        if: github.event_name == 'push'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/root/"

      # ssh in, write the .env, pull the latest image, restart the app
      - name: Deploy to Digital Ocean
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /root
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
            echo "SEC_USER_AGENT=${{ secrets.SEC_USER_AGENT }}" >> .env
            echo "MONGODB_DB_NAME=stocks_app" >> .env
            echo "FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            docker compose pull
            docker compose up -d mongodb web
