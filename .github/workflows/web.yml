name: Web CI/CD

# triggers on every push or PR to main
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # grab the latest code
      - name: Checkout code
        uses: actions/checkout@v4

      # need python to run our tests
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # install both web and pipeline deps — web imports pipeline code so we need both
      - name: Install dependencies
        run: |
          pip install -r web/requirements.txt
          pip install -r pipeline/requirements.txt
          pip install pytest pytest-cov

      # run the test suite — fails if coverage drops below 80%
      - name: Run tests
        run: |
          cd web
          pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=80

      # only push/deploy on actual pushes, not PRs
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # build from repo root so the Dockerfile can reach both web/ and pipeline/
      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stocks-web:latest

      # send the latest docker-compose to the server
      - name: Copy docker-compose to Digital Ocean
        if: github.event_name == 'push'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/root/"

      # ssh into the server, write secrets to .env, pull the new image, restart
      - name: Deploy to Digital Ocean
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /root
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
            echo "SEC_USER_AGENT=${{ secrets.SEC_USER_AGENT }}" >> .env
            echo "MONGODB_DB_NAME=stocks_app" >> .env
            echo "FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            docker compose pull
            docker compose up -d mongodb web
