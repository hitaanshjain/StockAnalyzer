name: Pipeline CI/CD

# triggers on every push or PR to main
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # grab the latest code
      - name: Checkout code
        uses: actions/checkout@v4

      # need python to run our tests
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # install pipeline dependencies + testing tools
      - name: Install dependencies
        run: |
          cd pipeline
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # run the test suite — fails if coverage drops below 80%
      - name: Run tests
        run: |
          cd pipeline
          pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=80

      # only push on actual pushes, not PRs
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # build and publish the image — no deploy step since the pipeline runs on demand
      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./pipeline
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stocks-pipeline:latest
