# pytest settings

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q"
pythonpath = [
  "."
]
testpaths = [
  "mongo_service/tests",
  "pipeline/tests",
  "web/tests",
]

[tool.coverage.run]
omit = [
  "*/tests/*",
  "*/run_pipeline.py",
  "*/stocks.py",
  "*/agent_workflow.py",
  "*/app.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
